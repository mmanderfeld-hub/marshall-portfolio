<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let timelines = [];

function setupPills() {
  const pills = document.querySelectorAll(".pill");
  timelines = [];

  pills.forEach((pill, i) => {
    const circle = pill.querySelector(".hover-circle");
    const label = pill.querySelector(".pill-label");
    const hover = pill.querySelector(".pill-label-hover");

    const rect = pill.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;

    const R = (((w * w) / 4) + (h * h)) / (2 * h);
    const D = Math.ceil(2 * R) + 2;
    const delta = Math.ceil(R - Math.sqrt(Math.max(0, R * R - (w * w) / 4))) + 1;
    const originY = D - delta;

    circle.style.width = `${D}px`;
    circle.style.height = `${D}px`;
    circle.style.bottom = `-${delta}px`;

    gsap.set(circle, {
      xPercent: -50,
      scale: 0,
      transformOrigin: `50% ${originY}px`
    });

    gsap.set(label, { y: 0, opacity: 1 });
    gsap.set(hover, { y: h + 10, opacity: 0 });

    const tl = gsap.timeline({ paused: true });

    tl.to(circle, {
      scale: 1.2,
      xPercent: -50,
      duration: 0.55,
      ease: "power2.out"
    }, 0);

    tl.to(label, {
      y: -(h + 8),
      opacity: 0,
      duration: 0.55,
      ease: "power2.out"
    }, 0);

    tl.to(hover, {
      y: 0,
      opacity: 1,
      duration: 0.55,
      ease: "power2.out"
    }, 0);

    timelines[i] = tl;

    pill.addEventListener("mouseenter", () => {
      tl.tweenTo(tl.duration(), {
        duration: 0.26,
        ease: "power2.out",
        overwrite: "auto"
      });
    });

    pill.addEventListener("mouseleave", () => {
      tl.tweenTo(0, {
        duration: 0.18,
        ease: "power2.out",
        overwrite: "auto"
      });
    });
  });
}

setupPills();
window.addEventListener("resize", setupPills);

const shell = document.getElementById("pillNavShell");
if (shell) {
  gsap.set(shell, { width: 0, opacity: 1, overflow: "hidden" });
  gsap.to(shell, {
    width: "auto",
    duration: 0.75,
    ease: "power2.out"
  });
}
</script>

</body>
